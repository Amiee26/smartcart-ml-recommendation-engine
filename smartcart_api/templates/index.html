<!DOCTYPE html>
<html>
{% load static %}
<head>

<title>SmartCart Recommendation System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background-image: url("{% static 'images/bg2.jpg' %}");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
margin:0;
}

.overlay{
background: rgba(0,0,0,0.6);
min-height:100vh;
text-align:center;
padding-top:80px;
}

h1, h3{
color:white;
text-shadow:2px 2px 6px rgba(0,0,0,0.8);
}

.search-box{
background:rgba(255,255,255,0.95);
padding:30px;
width:450px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.5);
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

/* 🔥 SUGGESTIONS */
#suggestions{
list-style:none;
padding:0;
margin:0;
text-align:left;
}

#suggestions li{
padding:5px;
cursor:pointer;
background:#eee;
margin-bottom:2px;
}

#suggestions li:hover{
background:#ddd;
}

#result{
margin-top:20px;
font-weight:bold;
color:black;
}

.section{
margin-top:40px;
background:rgba(255,255,255,0.9);
padding:20px;
width:60%;
margin-left:auto;
margin-right:auto;
border-radius:10px;
}

</style>

</head>

<body>

<div class="overlay">

<h1>🛒 SmartCart Recommendation System</h1>

<div class="search-box">

<input type="text" id="product" placeholder="Enter product name">

<ul id="suggestions"></ul>

<button id="searchBtn">Search</button>

<div id="result"></div>

</div>


<div class="section">

<h3>🔥 Top Selling Products</h3>

<ul id="topProducts"></ul>

</div>


<div class="section">

<h3>📊 Product Popularity Chart</h3>

<canvas id="chart" width="400" height="200"></canvas>

</div>

</div>

<script>


document.getElementById("searchBtn").addEventListener("click", function(){

let product=document.getElementById("product").value;

fetch("/api/recommend/"+product+"/")

.then(res=>res.json())

.then(data=>{
document.getElementById("result").innerHTML=
"Recommended Products: "+data.recommendations.join(", ");
});

});


document.getElementById("product").addEventListener("input", function(){

let query=this.value;

fetch("/api/suggest/?q="+query)

.then(res=>res.json())

.then(data=>{

let list=document.getElementById("suggestions");

list.innerHTML="";

data.suggestions.forEach(function(item){

let li=document.createElement("li");

li.textContent=item;

li.onclick=function(){
document.getElementById("product").value=item;
list.innerHTML="";
}

list.appendChild(li);

});

});

});



fetch("/api/top-products/")

.then(res=>res.json())

.then(data=>{

let list=document.getElementById("topProducts");

for(let item in data){

let li=document.createElement("li");

li.textContent=item+" ("+data[item]+")";

list.appendChild(li);

}

});


fetch("/api/top-products/")

.then(res=>res.json())

.then(data=>{

let labels=Object.keys(data);

let values=Object.values(data);

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Product Frequency",
data:values
}]
}

});

});

</script>

</body>
</html>
